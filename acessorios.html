        function renderizar(lista) {
            const grid = document.getElementById('grid-produtos');
            grid.innerHTML = lista.map((p) => {
                const safeId = p.nome.replace(/\s+/g, '-').replace(/[^\w-]/g, '');
                return `
                <div class="bg-cinza-escuro rounded-xl overflow-hidden shadow-lg flex flex-col h-full text-left group border border-transparent hover:border-dourado transition-all">
                    <div class="h-64 bg-white flex items-center justify-center p-4 relative group/img">
                        ${p.fotos.length > 1 ? `
                            <button onclick="mudarFoto('${p.nome}', -1, '${safeId}')" class="absolute left-2 z-10 bg-black/20 hover:bg-dourado text-white p-2 rounded-full opacity-0 group-hover/img:opacity-100 transition-all">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7" /></svg>
                            </button>
                            <button onclick="mudarFoto('${p.nome}', 1, '${safeId}')" class="absolute right-2 z-10 bg-black/20 hover:bg-dourado text-white p-2 rounded-full opacity-0 group-hover/img:opacity-100 transition-all">
                                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7" /></svg>
                            </button>
                        ` : ''}
                        <img id="img-${safeId}" src="${p.fotos[0]}" data-index="0" class="max-h-full max-w-full object-contain transition-transform duration-500">
                    </div>
                    <div class="p-6 flex flex-col flex-grow">
                        <h3 class="font-bold text-lg mb-3 text-white leading-tight">${p.nome}</h3>
                        <ul class="text-cinza-texto text-xs mb-6 space-y-1 flex-grow">
                            ${p.specs.map(s => `<li>• ${s}</li>`).join('')}
                        </ul>
                        <p class="text-xl font-bold text-dourado mb-4">Orçar Valor</p>
                        <button onclick="abrirModalSelecao('${p.nome}')" class="bg-dourado text-black py-3 rounded-lg font-bold hover:bg-dourado-hover transition-colors w-full uppercase text-xs tracking-widest">
                            Ver Disponibilidade
                        </button>
                    </div>
                </div>`;
            }).join('');
        }

        function mudarFoto(nomeProduto, direcao, safeId) {
            const imgElement = document.getElementById(`img-${safeId}`);
            const produto = todosProdutos.find(p => p.nome === nomeProduto);
            if (!produto) return;
            let currentFotoIdx = parseInt(imgElement.getAttribute('data-index'));
            currentFotoIdx += direcao;
            if (currentFotoIdx >= produto.fotos.length) currentFotoIdx = 0;
            if (currentFotoIdx < 0) currentFotoIdx = produto.fotos.length - 1;
            imgElement.src = produto.fotos[currentFotoIdx];
            imgElement.setAttribute('data-index', currentFotoIdx);
        }

        function abrirModalSelecao(produto = "") {
            const msg = encodeURIComponent(`Olá! Tenho interesse no produto: ${produto}. Gostaria de orçar o valor.`);
            document.getElementById('link-aguas').href = `${storeNumbers.aguas}?text=${msg}`;
            document.getElementById('link-santo').href = `${storeNumbers.santo}&text=${msg}`;
            document.getElementById('link-gama').href = `${storeNumbers.gama}?text=${msg}`;
            document.getElementById('whatsapp-modal').classList.remove('hidden');
        }

        function fecharModal() { document.getElementById('whatsapp-modal').classList.add('hidden'); }

        function filtrar(categoria) {
            const tituloPagina = document.getElementById('titulo-pagina');
            const titulos = {
                'todos': 'Tudo que você <span class="text-dourado">Precisa</span>',
                'iluminacao': 'Sistemas de <span class="text-dourado">Iluminação</span>',
                'lataria': 'Peças de <span class="text-dourado">Lataria</span>',
                'acessorios': 'Acessórios <span class="text-dourado">Exclusivos</span>',
                'grades': 'Para-choques e <span class="text-dourado">Grades</span>',
                'acessorios': 'Itens de <span class="text-dourado">acessorios</span>',
                'mecanica': 'Peças de <span class="text-dourado">Mecânica</span>'
            };

            if (tituloPagina && titulos[categoria]) {
                tituloPagina.innerHTML = titulos[categoria];
            }

            document.querySelectorAll('.filter-btn').forEach(btn => {
                const isTarget = btn.getAttribute('data-cat') === categoria;
                btn.className = isTarget 
                    ? "filter-btn bg-dourado text-black px-5 py-2 rounded-full font-bold transition-all text-sm"
                    : "filter-btn bg-cinza-escuro text-white px-5 py-2 rounded-full transition-all text-sm";
            });

            if(categoria === 'todos') { renderizar(todosProdutos); } 
            else { renderizar(todosProdutos.filter(p => p.cat === categoria)); }
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        window.onload = () => {
            const urlParams = new URLSearchParams(window.location.search);
            const categoriaUrl = urlParams.get('cat') || 'todos';
            filtrar(categoriaUrl);
        };
